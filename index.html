<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LANDXML Viewer (Leaflet) 1</title>

  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.2/dist/proj4.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }
    #sidebar { width: 320px; padding: 10px; overflow: auto; }
    #map { flex: 1; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>LANDXML Viewer</h3>
  <input type="file" id="fileInput" accept=".xml,.landxml" />
  <div id="status"></div>
</div>

<div id="map"></div>

<script>
let map = L.map('map').setView([43.7, -79.4], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20
}).addTo(map);

let layer;

// ------------------------------
// FILE LOAD
// ------------------------------
document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const text = await file.text();

  const pts = parseLandXML(text);

  if (layer) map.removeLayer(layer);

  const latlngs = pts.map(p => mtmToLatLng(p.x, p.y));

  layer = L.polyline(latlngs, { color: 'blue' }).addTo(map);

  map.fitBounds(layer.getBounds());

  document.getElementById("status").innerText = `Loaded points: ${pts.length}`;
});

// ------------------------------
// SIMPLE LANDXML PARSER
// ------------------------------
function parseLandXML(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const pts = [];

  // namespace-safe traversal
  const all = xml.getElementsByTagName("*");

  let station = 0;

  for (let i = 0; i < all.length; i++) {
    const n = all[i];

    if (n.localName === "Line") {
      const start = n.getElementsByTagName("Start")[0];
      const end = n.getElementsByTagName("End")[0];
      if (!start || !end) continue;

      const x1 = parseFloat(start.textContent.split(" ")[0]);
      const y1 = parseFloat(start.textContent.split(" ")[1]);
      const x2 = parseFloat(end.textContent.split(" ")[0]);
      const y2 = parseFloat(end.textContent.split(" ")[1]);

      pts.push({ x: x1, y: y1 });
      pts.push({ x: x2, y: y2 });
    }

    if (n.localName === "Arc" || n.localName === "Spiral") {
      const start = n.getElementsByTagName("Start")[0];
      const end = n.getElementsByTagName("End")[0];
      if (!start || !end) continue;

      const x1 = parseFloat(start.textContent.split(" ")[0]);
      const y1 = parseFloat(start.textContent.split(" ")[1]);
      const x2 = parseFloat(end.textContent.split(" ")[0]);
      const y2 = parseFloat(end.textContent.split(" ")[1]);

      // simple densification (placeholder)
      const steps = 10;
      for (let t = 0; t <= steps; t++) {
        const k = t / steps;
        pts.push({
          x: x1 + (x2 - x1) * k,
          y: y1 + (y2 - y1) * k
        });
      }
    }
  }

  return pts;
}

// ------------------------------
// COORD CONVERSION (PLACEHOLDER)
// ------------------------------
function mtmToLatLng(x, y) {
  // NOTE: assumes MTM-like coordinates already near local zone
  return proj4("EPSG:32195", "WGS84", [x, y]).reverse();
}

</script>

</body>
</html>
