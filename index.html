<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LANDXML Station Tracker</title>

  <!-- PROJ -->
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.2/dist/proj4.js"></script>

  <!-- LEAFLET -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 320px; padding: 12px; overflow: auto; }
    #map { flex: 1; }
    .box { margin-top: 12px; }
    #station { font-size: 28px; font-weight: bold; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>LANDXML Station Tracker</h2>

  <input type="file" id="fileInput" accept=".xml,.landxml" />

  <div class="box">
    <h3>GPS</h3>
    <div id="gps">Waiting...</div>
  </div>

  <div class="box">
    <h3>Projected (MTM)</h3>
    <div id="proj">--</div>
  </div>

  <div class="box">
    <h3>Station</h3>
    <div id="station">Load alignment</div>
    <div id="offset"></div>
  </div>
</div>

<div id="map"></div>

<script>

// -----------------------------
// PROJECTION
// -----------------------------
proj4.defs(
  "MTM",
  "+proj=tmerc +lat_0=0 +lon_0=-79.5 +k=0.9999 +x_0=304800 +y_0=0 +datum=NAD83 +units=m +no_defs"
);

let alignment = null;
let map;
let alignmentLayer;
let gpsMarker;
let userLine;

// -----------------------------
// INIT MAP
// -----------------------------
function initMap() {
  map = L.map('map').setView([43.7, -79.4], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20
  }).addTo(map);
}

initMap();

// -----------------------------
// GPS WATCH
// -----------------------------
navigator.geolocation.watchPosition((pos) => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  document.getElementById("gps").innerText = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

  const [x, y] = proj4("WGS84", "MTM", [lon, lat]);

  document.getElementById("proj").innerText = `${x.toFixed(2)}, ${y.toFixed(2)}`;

  const latlng = [lat, lon];

  if (!gpsMarker) {
    gpsMarker = L.marker(latlng).addTo(map);
  } else {
    gpsMarker.setLatLng(latlng);
  }

  if (alignment) {
    const info = computeStation(alignment, x, y);
    if (info) {
      document.getElementById("station").innerText = formatStation(info.station);
      document.getElementById("offset").innerText = "Offset: " + info.offset.toFixed(2) + " m";

      // draw user projection line
      const userLatLng = gpsToLatLng(info.point.x, info.point.y);

      if (!userLine) {
        userLine = L.polyline([latlng, userLatLng], { color: 'red' }).addTo(map);
      } else {
        userLine.setLatLngs([latlng, userLatLng]);
      }
    }
  }
}, console.error, { enableHighAccuracy: true });

// -----------------------------
// LANDXML LOADER
// -----------------------------

// NOTE: simplified but now supports Line + Arc

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const text = await file.text();

  alignment = parseLandXML(text);

  drawAlignment();

  alert("Alignment loaded");
});

// -----------------------------
// LANDXML PARSER (BASIC CIVILD3D SUPPORT)
// -----------------------------
function parseLandXML(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const coordGeom = xml.querySelectorAll("CoordGeom")[0];
  if (!coordGeom) return [];

  const segments = [];
  let station = 0;

  coordGeom.childNodes.forEach(node => {
    if (node.nodeName === "Line") {
      const start = node.querySelector("Start");
      const end = node.querySelector("End");

      if (!start || !end) return;

      const x1 = parseFloat(start.getAttribute("x"));
      const y1 = parseFloat(start.getAttribute("y"));
      const x2 = parseFloat(end.getAttribute("x"));
      const y2 = parseFloat(end.getAttribute("y"));

      station += Math.hypot(x2-x1, y2-y1);

      segments.push({ x: x2, y: y2, station });
    }

    // ARC (approximated)
    if (node.nodeName === "Arc") {
      const start = node.querySelector("Start");
      const end = node.querySelector("End");

      if (!start || !end) return;

      const x1 = parseFloat(start.getAttribute("x"));
      const y1 = parseFloat(start.getAttribute("y"));
      const x2 = parseFloat(end.getAttribute("x"));
      const y2 = parseFloat(end.getAttribute("y"));

      const radius = parseFloat(node.getAttribute("radius")) || null;

      const steps = 10;

      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        const x = x1 + (x2 - x1) * t;
        const y = y1 + (y2 - y1) * t;

        station += Math.hypot(x - (segments.at(-1)?.x || x1), y - (segments.at(-1)?.y || y1));

        segments.push({ x, y, station });
      }
    }
  });

  return segments;
}

// -----------------------------
// DRAW ALIGNMENT ON MAP
// -----------------------------
function drawAlignment() {
  if (alignmentLayer) map.removeLayer(alignmentLayer);

  const latlngs = alignment.map(p => mtmToLatLng(p.x, p.y));

  alignmentLayer = L.polyline(latlngs, { color: 'blue' }).addTo(map);

  map.fitBounds(alignmentLayer.getBounds());
}

// -----------------------------
// STATION CALCULATION
// -----------------------------
function computeStation(alignment, x, y) {
  let best = null;
  let minDist = Infinity;

  for (let i = 0; i < alignment.length - 1; i++) {
    const a = alignment[i];
    const b = alignment[i + 1];

    const res = project(a, b, {x, y});

    if (res.dist < minDist) {
      minDist = res.dist;
      best = res;
    }
  }

  return best;
}

function project(a, b, p) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;

  const t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / (dx*dx + dy*dy);
  const tt = Math.max(0, Math.min(1, t));

  const x = a.x + tt*dx;
  const y = a.y + tt*dy;

  const dist = Math.hypot(p.x-x, p.y-y);
  const station = a.station + tt*(b.station - a.station);

  return { station, dist, point: {x,y} };
}

// -----------------------------
// COORD CONVERSIONS
// -----------------------------
function mtmToLatLng(x, y) {
  return proj4("MTM", "WGS84", [x, y]).reverse();
}

function gpsToLatLng(x, y) {
  return proj4("MTM", "WGS84", [x, y]).reverse();
}

// -----------------------------
// FORMAT STATION
// -----------------------------
function formatStation(sta) {
  const whole = Math.floor(sta);
  const dec = Math.round((sta - whole) * 100);
  return `${whole}+${dec.toString().padStart(2,'0')}`;
}

</script>

</body>
</html>
